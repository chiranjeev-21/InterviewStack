spring:
  application:
    name: interview-bank

  profiles:
    active: dev

  datasource:
    url: jdbc:h2:mem:interviewbankdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cache:
    type: simple

server:
  port: 8080
  error:
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-key-minimum-256-bits-long-for-hs256-algorithm}
    # Must match app.jwt.issuer in the token-generator repo.
    issuer: interview-bank-token-generator
    # Must match this app's clientId registered in token-generator's app.clients
    audience: interview-bank
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.interviewbank: DEBUG
    org.springframework.security: INFO

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
